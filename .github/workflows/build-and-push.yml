name: Build and Push Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: woodgrove-northwind
  IMAGE_VERSION: v1.0.0-${{ github.run_number }}
  # Azure ACR registries
  ALPINE_ACR_ENDPOINT: ${{ vars.ALPINE_ACR_ENDPOINT }}
  ACRGATED_ACR_ENDPOINT: ${{ vars.ACRGATED_ACR_ENDPOINT }}
  AIAGENTDEMO_ACR_ENDPOINT: aiagentdemo-anh2evbtdybbffgr.azurecr.io
  ALPINEACR2_ACR_ENDPOINT: alpineacr2.azurecr.io
  P4AISAMPLE_ACR_ENDPOINT: p4aisampleacr3wz76o5tfmbes.azurecr.io
  SLDEMOACR_ACR_ENDPOINT: sldemoacr.azurecr.io
  # GCP GAR
  GCP_GAR_REGION: us
  GCP_PROJECT_ID: mdc-demo
  GCP_GAR_REPO: mdc-gcp-artifactregistry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      artifact-metadata: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # Determine which registries are available
      # ============================================================
      - name: Check GCP configuration
        id: gcp-check
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::GCP secrets not configured - skipping GCP GAR push"
          fi

      # ============================================================
      # Registry Logins
      # ============================================================

      - name: Log in to Alpine ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALPINE_ACR_ENDPOINT }}
          username: ${{ secrets.ALPINE_ACR_USERNAME }}
          password: ${{ secrets.ALPINE_ACR_PASSWORD }}

      - name: Log in to Acrgated ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACRGATED_ACR_ENDPOINT }}
          username: ${{ secrets.ACRGATED_ACR_USERNAME }}
          password: ${{ secrets.ACRGATED_ACR_PASSWORD }}

      - name: Log in to AI Agent Demo ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AIAGENTDEMO_ACR_ENDPOINT }}
          username: ${{ secrets.AIAGENTDEMO_ACR_USERNAME }}
          password: ${{ secrets.AIAGENTDEMO_ACR_PASSWORD }}

      - name: Log in to Alpine ACR 2
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALPINEACR2_ACR_ENDPOINT }}
          username: ${{ secrets.ALPINEACR2_ACR_USERNAME }}
          password: ${{ secrets.ALPINEACR2_ACR_PASSWORD }}

      - name: Log in to P4AI Sample ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.P4AISAMPLE_ACR_ENDPOINT }}
          username: ${{ secrets.P4AISAMPLE_ACR_USERNAME }}
          password: ${{ secrets.P4AISAMPLE_ACR_PASSWORD }}

      - name: Log in to SL Demo ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SLDEMOACR_ACR_ENDPOINT }}
          username: ${{ secrets.SLDEMOACR_ACR_USERNAME }}
          password: ${{ secrets.SLDEMOACR_ACR_PASSWORD }}

      - name: Authenticate to Google Cloud
        if: steps.gcp-check.outputs.configured == 'true'
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Log in to GCP Artifact Registry
        if: steps.gcp-check.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # ============================================================
      # Build (using standard docker build, NOT BuildKit)
      # BuildKit bypasses Docker daemon events that MSDO
      # container-mapping relies on for pipeline→image tracking.
      # ============================================================

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.ref.name=${{ github.ref_name }}" \
            --label "org.opencontainers.image.url=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.title=${{ env.IMAGE_NAME }}" \
            --label "org.opencontainers.image.version=${{ env.IMAGE_VERSION }}" \
            --label "org.label-schema.vcs-url=https://github.com/${{ github.repository }}" \
            --label "com.azure.dev.image.build.repository.uri=https://github.com/${{ github.repository }}" \
            --label "com.visualstudio.msazure.image.build.repository.uri=https://github.com/${{ github.repository }}" \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
        env:
          DOCKER_BUILDKIT: "0"

      # ============================================================
      # Tag for all registries
      # ============================================================

      - name: Tag images for all registries
        run: |
          REGISTRIES=(
            "${{ env.ALPINE_ACR_ENDPOINT }}"
            "${{ env.ACRGATED_ACR_ENDPOINT }}"
            "${{ env.AIAGENTDEMO_ACR_ENDPOINT }}"
            "${{ env.ALPINEACR2_ACR_ENDPOINT }}"
            "${{ env.P4AISAMPLE_ACR_ENDPOINT }}"
            "${{ env.SLDEMOACR_ACR_ENDPOINT }}"
          )
          for reg in "${REGISTRIES[@]}"; do
            docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} "${reg}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            docker tag ${{ env.IMAGE_NAME }}:latest "${reg}/${{ env.IMAGE_NAME }}:latest"
          done

          # GCP tag (conditional)
          if [ "${{ steps.gcp-check.outputs.configured }}" == "true" ]; then
            GCP_IMAGE="${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}"
            docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} "${GCP_IMAGE}:${{ github.sha }}"
            docker tag ${{ env.IMAGE_NAME }}:latest "${GCP_IMAGE}:latest"
          fi

      # ============================================================
      # Push to all registries (using standard docker push)
      # ============================================================

      - name: Push to all ACR registries
        run: |
          REGISTRIES=(
            "${{ env.ALPINE_ACR_ENDPOINT }}"
            "${{ env.ACRGATED_ACR_ENDPOINT }}"
            "${{ env.AIAGENTDEMO_ACR_ENDPOINT }}"
            "${{ env.ALPINEACR2_ACR_ENDPOINT }}"
            "${{ env.P4AISAMPLE_ACR_ENDPOINT }}"
            "${{ env.SLDEMOACR_ACR_ENDPOINT }}"
          )
          for reg in "${REGISTRIES[@]}"; do
            echo "::group::Pushing to ${reg}"
            docker push "${reg}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            docker push "${reg}/${{ env.IMAGE_NAME }}:latest"
            echo "::endgroup::"
          done

      - name: Push to GCP GAR
        if: steps.gcp-check.outputs.configured == 'true'
        run: |
          GCP_IMAGE="${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${GCP_IMAGE}:${{ github.sha }}"
          docker push "${GCP_IMAGE}:latest"

      # ============================================================
      # Get image digest for attestations
      # ============================================================

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" 2>/dev/null | sed 's/.*@//' || echo "")
          if [ -z "$DIGEST" ]; then
            DIGEST=$(docker inspect --format='{{.Id}}' "${{ env.IMAGE_NAME }}:${{ github.sha }}")
          fi
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Image digest: ${DIGEST}"

      # ============================================================
      # GitHub Attestations
      # ============================================================

      - name: Attestation for Alpine ACR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Attestation for Acrgated ACR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ACRGATED_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Attestation for GAR image
        if: steps.gcp-check.outputs.configured == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      # ============================================================
      # Artifact Metadata Storage Record
      # ============================================================

      - name: Create artifact metadata storage record
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n \
            --arg artifactName "${{ env.IMAGE_NAME }}" \
            --arg artifactVersion "${{ env.IMAGE_VERSION }}" \
            --arg artifactDigest "${{ steps.digest.outputs.digest }}" \
            '{"name": $artifactName, "digest": $artifactDigest, "version": $artifactVersion, "registry_url": "https://azurecr.io", "repository": "woodgrove-northwind"}' \
            > create-record.json
          gh api -X POST orgs/${{ github.repository_owner }}/artifacts/metadata/storage-record --input create-record.json
        shell: bash

      # ============================================================
      # Container Mapping (Pipeline Discovery)
      # ============================================================

      - name: Run Microsoft Security DevOps (container-mapping)
        if: always()
        uses: microsoft/security-devops-action@latest
        id: msdo
        with:
          tools: container-mapping

      # ============================================================
      # Summary
      # ============================================================

      - name: Summary
        if: always()
        run: |
          echo "### Container Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Alpine ACR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Acrgated ACR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Agent Demo ACR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Alpine ACR 2 | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| P4AI Sample ACR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SL Demo ACR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gcp-check.outputs.configured }}" == "true" ]; then
            echo "| GCP GAR | ${{ env.IMAGE_NAME }} | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **OCI Labels:** Applied (C2C mapping)" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Mapping:** MSDO container-mapping executed" >> $GITHUB_STEP_SUMMARY
          echo "- **Attestations:** Generated for primary registries" >> $GITHUB_STEP_SUMMARY
