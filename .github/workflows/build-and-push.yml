name: Build and Push Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: shift-left-demo
  IMAGE_VERSION: v1.0.0-${{ github.run_number }}
  # Azure ACR
  ACR_ENDPOINT: ${{ vars.ACR_ENDPOINT }}
  # GCP GAR
  GCP_GAR_REGION: us
  GCP_PROJECT_ID: mdc-demo
  GCP_GAR_REPO: mdc-gcp-artifactregistry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Method 2: Generate OCI labels for Code-to-Runtime mapping ---
      - name: Generate OCI metadata labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
            ${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.label-schema.vcs-url=https://github.com/${{ github.repository }}
            com.azure.dev.image.build.repository.uri=https://github.com/${{ github.repository }}
            com.visualstudio.msazure.image.build.repository.uri=https://github.com/${{ github.repository }}

      # ============================================================
      # Registry Logins
      # ============================================================

      # --- Login to Azure ACR ---
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_ENDPOINT }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # --- Login to GCP GAR via Workload Identity Federation ---
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Log in to GCP Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # ============================================================
      # Build and Push (single build, multi-registry push)
      # ============================================================

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ============================================================
      # Method 3: GitHub Attestations
      # ============================================================

      - name: Attestation for ACR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attestation for GAR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # ============================================================
      # Summary
      # ============================================================

      - name: Summary
        run: |
          echo "### Container Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | Image | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ACR (${{ env.ACR_ENDPOINT }}) | ${{ env.IMAGE_NAME }} | \`${DIGEST:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP GAR (${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}) | ${{ env.IMAGE_NAME }} | \`${DIGEST:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **OCI Labels:** Applied (Method 2 - C2C mapping)" >> $GITHUB_STEP_SUMMARY
          echo "- **Attestations:** Generated for both registries (Method 3 - provenance)" >> $GITHUB_STEP_SUMMARY
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
