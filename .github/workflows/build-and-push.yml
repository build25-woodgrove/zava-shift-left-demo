name: Build and Push Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_ENDPOINT: ${{ vars.ACR_ENDPOINT }}
  IMAGE_NAME: shift-left-demo
  IMAGE_VERSION: v1.0.0-${{ github.run_number }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Method 2: Generate OCI labels for Code-to-Runtime mapping ---
      - name: Generate OCI metadata labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}

      # --- Login to ACR ---
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_ENDPOINT }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # --- Build and push with OCI labels (Method 2) ---
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --- Method 3: GitHub Attestation for provenance ---
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "### Container Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.ACR_ENDPOINT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OCI Labels:** Applied (Method 2 - C2C mapping)" >> $GITHUB_STEP_SUMMARY
          echo "- **Attestation:** Generated (Method 3 - provenance)" >> $GITHUB_STEP_SUMMARY
