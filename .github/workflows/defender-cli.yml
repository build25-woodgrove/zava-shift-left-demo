name: Defender CLI Scan (New CLI)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  IMAGE_NAME: shift-left-demo
  ALPINE_ACR_ENDPOINT: ${{ vars.ALPINE_ACR_ENDPOINT }}

jobs:
  defender-cli-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the container image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Push image to ACR
      - name: Log in to Alpine ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALPINE_ACR_ENDPOINT }}
          username: ${{ secrets.ALPINE_ACR_USERNAME }}
          password: ${{ secrets.ALPINE_ACR_PASSWORD }}

      - name: Push image to ACR
        run: |
          docker push ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Download Defender for Cloud CLI
      - name: Download Defender for Cloud CLI
        run: |
          curl -L -o defender "https://aka.ms/defender-cli_linux-x64"
          chmod +x defender
          echo "$(pwd)" >> $GITHUB_PATH

      # Scan the pushed container image (connector-based auth via OIDC)
      - name: Run Defender for Cloud CLI Scan
        run: |
          ./defender scan image '${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
        continue-on-error: true

      # Find the SARIF result file
      - name: Find SARIF results
        if: always()
        id: sarif
        run: |
          SARIF_FILE=$(find .gdn -path '*/.r/mdvm/*/mdvm.sarif' -type f | head -1)
          echo "sarif_file=${SARIF_FILE}" >> $GITHUB_OUTPUT
          echo "Found SARIF: ${SARIF_FILE}"

      # Upload SARIF results to GitHub Security tab
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.sarif.outputs.sarif_file != ''
        with:
          sarif_file: ${{ steps.sarif.outputs.sarif_file }}
          category: defender-cli-image-scan
